  local_auth: ^2.3.0
  cryptography: ^2.7.0
  mobile_scanner: ^6.0.2
  qr_flutter: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
